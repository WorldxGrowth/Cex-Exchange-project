<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="VDExchange - Secure Crypto Trading Platform. Trade BTC, ETH, VDC and more with low fees." />
    <meta name="keywords" content="crypto exchange, bitcoin, ethereum, VDC, trading" />
    <meta property="og:title" content="VDExchange - Crypto Trading" />
    <meta property="og:description" content="Trade crypto with confidence on VDExchange" />
    <title>VDExchange - Crypto Trading Platform</title>
    <style>
      html, body { background: #0b0e11; margin: 0; padding: 0; }
      #app-preloader {
        position: fixed; inset: 0; z-index: 99999;
        background: #0b0e11;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 20px;
      }
      #app-preloader .logo {
        font-size: 30px; font-weight: 800; color: #F0B90B; letter-spacing: 1px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #app-preloader .spinner {
        width: 38px; height: 38px; border-radius: 50%;
        border: 3px solid #2b2f36; border-top: 3px solid #F0B90B;
        animation: app-preloader-spin 0.8s linear infinite;
      }
      @keyframes app-preloader-spin { to { transform: rotate(360deg); } }
      #app-preloader.fade-out { opacity: 0; transition: opacity 0.25s ease; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="app-preloader">
      <div class="logo">⚡ VDExchange</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script>
      window.__hidePreloader = function () {
        var el = document.getElementById('app-preloader');
        if (!el) return;
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 300);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
